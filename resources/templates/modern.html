<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Segoe UI', Arial, sans-serif; font-size: 10.5pt; color: #1e2a3a; line-height: 1.55; }
  .header { background: #1e3a5f; color: white; padding: 32px 48px; }
  .header h1 { font-size: 28pt; font-weight: 700; color: white; margin-bottom: 8px; letter-spacing: -0.5px; }
  .contact-row { color: #a8c4e0; font-size: 10pt; margin-top: 4px; }
  .contact-row a { color: #7eb4d8; text-decoration: none; }
  .body { padding: 28px 48px; }
  h2 { font-size: 11pt; font-weight: 700; color: #1e3a5f; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid #1e3a5f; padding-bottom: 4px; margin: 24px 0 12px; }
  p { margin-bottom: 8px; color: #2d3f50; }
  .experience-item, .education-item { margin-bottom: 18px; }
  .exp-header, .edu-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2px; }
  .exp-title { font-weight: 700; font-size: 11.5pt; color: #1e2a3a; }
  .edu-degree { font-weight: 700; font-size: 11.5pt; color: #1e2a3a; }
  .exp-company, .edu-institution { color: #1e3a5f; font-size: 10.5pt; font-weight: 500; }
  .exp-dates, .edu-year { color: #6b8fa8; font-size: 10pt; white-space: nowrap; padding-left: 12px; flex-shrink: 0; }
  .exp-desc { color: #2d3f50; margin-top: 5px; }
  .achievements { margin-top: 5px; padding-left: 18px; color: #2d3f50; }
  .achievements li { margin-bottom: 3px; }
  .skills-wrap { display: flex; flex-wrap: wrap; gap: 5px 7px; }
  .skill-tag { padding: 4px 12px; background: #e8f0f8; color: #1e3a5f; border-radius: 20px; font-size: 10pt; font-weight: 500; }
  .cert-item { margin-bottom: 6px; font-size: 10.5pt; }
  .cert-name { font-weight: 600; color: #1e3a5f; }
  .section { margin-bottom: 4px; }
</style>
</head>
<body>
  <div class="header">
    <h1>{{FULL_NAME}}</h1>
    <div class="contact-row">{{EMAIL}} &nbsp;·&nbsp; {{PHONE}} &nbsp;·&nbsp; {{LOCATION}}</div>
    <div class="contact-row">{{LINKEDIN}} &nbsp;·&nbsp; {{GITHUB}} &nbsp;·&nbsp; {{WEBSITE}}</div>
  </div>

  <div class="body">
    <div class="section">
      <h2>Summary</h2>
      <p>{{SUMMARY}}</p>
    </div>

    <div class="section">
      <h2>Experience</h2>
      {{EXPERIENCE}}
    </div>

    <div class="section">
      <h2>Education</h2>
      {{EDUCATION}}
    </div>

    <div class="section">
      <h2>Skills</h2>
      <div class="skills-wrap">{{SKILLS}}</div>
    </div>

    <div class="section">
      {{CERTIFICATIONS}}
    </div>
  </div>
</body>
</html>
