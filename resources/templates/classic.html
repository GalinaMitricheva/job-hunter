<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', 'Times New Roman', serif; font-size: 11pt; color: #1a1a1a; padding: 48px 52px; line-height: 1.55; }
  h1 { font-size: 26pt; font-weight: bold; color: #111; margin-bottom: 4px; }
  .contact-row { color: #555; font-size: 10pt; margin-bottom: 3px; }
  .contact-row a { color: #1a5fb4; text-decoration: none; }
  .divider { border: none; border-top: 2px solid #222; margin: 16px 0 8px; }
  h2 { font-size: 12pt; font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px; color: #222; border-bottom: 1px solid #bbb; padding-bottom: 4px; margin: 22px 0 10px; }
  p { margin-bottom: 8px; }
  .experience-item, .education-item { margin-bottom: 16px; }
  .exp-header, .edu-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2px; }
  .exp-title { font-weight: bold; font-size: 11.5pt; }
  .edu-degree { font-weight: bold; font-size: 11.5pt; }
  .exp-company, .edu-institution { color: #444; font-size: 10.5pt; font-style: italic; }
  .exp-dates, .edu-year { color: #666; font-size: 10pt; white-space: nowrap; padding-left: 12px; flex-shrink: 0; }
  .exp-desc { color: #333; margin-top: 4px; }
  .achievements { margin-top: 5px; padding-left: 18px; color: #333; }
  .achievements li { margin-bottom: 3px; }
  .skills-wrap { display: flex; flex-wrap: wrap; gap: 4px 6px; }
  .skill-tag { padding: 3px 10px; background: #f0f0f0; border: 1px solid #d8d8d8; border-radius: 3px; font-size: 10pt; }
  .cert-item { margin-bottom: 5px; font-size: 10.5pt; }
  .cert-name { font-weight: 600; }
  .section { margin-bottom: 4px; }
</style>
</head>
<body>
  <h1>{{FULL_NAME}}</h1>
  <div class="contact-row">{{EMAIL}} &nbsp;·&nbsp; {{PHONE}} &nbsp;·&nbsp; {{LOCATION}}</div>
  <div class="contact-row">{{LINKEDIN}} &nbsp;·&nbsp; {{GITHUB}} &nbsp;·&nbsp; {{WEBSITE}}</div>
  <hr class="divider">

  <div class="section">
    <h2>Professional Summary</h2>
    <p>{{SUMMARY}}</p>
  </div>

  <div class="section">
    <h2>Experience</h2>
    {{EXPERIENCE}}
  </div>

  <div class="section">
    <h2>Education</h2>
    {{EDUCATION}}
  </div>

  <div class="section">
    <h2>Skills</h2>
    <div class="skills-wrap">{{SKILLS}}</div>
  </div>

  <div class="section">
    {{CERTIFICATIONS}}
  </div>
</body>
</html>
